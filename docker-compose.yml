services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/data
      - backend_media:/media

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL-http://localhost:8000}
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
  backend_media:
